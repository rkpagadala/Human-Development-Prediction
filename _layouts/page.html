---
layout: default
---
<article class="page">
  <header class="page-header">
    <h1 class="page-title">{{ page.title | escape }}</h1>
  </header>

  <div class="page-content">
    {{ content }}
  </div>
</article>

<style>
table th { cursor: pointer; user-select: none; white-space: nowrap; }
table th:hover { background: #eef; }
table th.sort-asc::after  { content: " ▲"; font-size: 0.75em; }
table th.sort-desc::after { content: " ▼"; font-size: 0.75em; }
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
  document.querySelectorAll("table").forEach(function (table) {
    var headers = table.querySelectorAll("th");
    if (!headers.length) return;
    headers.forEach(function (th, col) {
      th.style.cursor = "pointer";
      th.addEventListener("click", function () {
        var asc = !th.classList.contains("sort-asc");
        headers.forEach(function (h) { h.classList.remove("sort-asc", "sort-desc"); });
        th.classList.add(asc ? "sort-asc" : "sort-desc");
        var tbody = table.querySelector("tbody") || table;
        var rows = Array.from(tbody.querySelectorAll("tr")).filter(function (r) {
          return r.querySelectorAll("th").length === 0;
        });
        rows.sort(function (a, b) {
          var av = (a.cells[col] ? a.cells[col].innerText : "") || "";
          var bv = (b.cells[col] ? b.cells[col].innerText : "") || "";
          var an = parseFloat(av.replace(/[^0-9.\-]/g, ""));
          var bn = parseFloat(bv.replace(/[^0-9.\-]/g, ""));
          if (!isNaN(an) && !isNaN(bn)) return asc ? an - bn : bn - an;
          return asc ? av.localeCompare(bv) : bv.localeCompare(av);
        });
        rows.forEach(function (r) { tbody.appendChild(r); });
      });
    });
  });
});
</script>
